services:
  db:
    image: postgres:16-alpine
    container_name: iaw-postgres
    environment:
      POSTGRES_DB: iaw
      POSTGRES_USER: iaw
      POSTGRES_PASSWORD: iaw
    ports:
      - "5433:5432"
    volumes:
      - iaw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iaw -d iaw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  iaw-pgdata:
